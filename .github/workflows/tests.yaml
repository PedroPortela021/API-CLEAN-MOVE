name: Automated Tests

on: pull_request

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - run: npm ci
      - run: npm run prisma:generate
      - run: npm test -- --passWithNoTests

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      FRONTEND_URL: http://localhost:5000
      POSTGRES_HOST: localhost
      POSTGRES_DB: api-clean-move
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/api-clean-move
      JWT_ACCESS_SECRET: test-access-secret-with-at-least-32-chars
      JWT_REFRESH_SECRET: test-refresh-secret-with-at-least-32-char
      JWT_ACCESS_EXPIRES_IN: 15m
      REFRESH_TOKEN_TTL_IN_MS: 1296000000
      GOOGLE_CLIENT_ID: test-google-client-id
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - run: npm ci
      - run: npm run prisma:generate

      - name: Create CI env file for Docker Compose
        run: |
          cat <<EOF > .env
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          DATABASE_URL=${DATABASE_URL}
          NODE_ENV=${NODE_ENV}
          FRONTEND_URL=${FRONTEND_URL}
          JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN}
          REFRESH_TOKEN_TTL_IN_MS=${REFRESH_TOKEN_TTL_IN_MS}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          EOF

      - name: Start Postgres with Docker Compose
        run: docker compose up -d postgres

      - name: Wait for Postgres healthcheck
        run: |
          for i in {1..20}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' clean-move-postgres)
            if [ "$STATUS" = "healthy" ]; then
              exit 0
            fi
            sleep 3
          done
          docker compose logs postgres
          exit 1

      - run: npm run test:e2e

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
